packages:
  - 'apps/*'
  - 'packages/*'
catalog:
  '@types/node': '^24.0.0'
  eslint: '^9.10.0'
  '@typescript-eslint/eslint-plugin': '^8.5.0'
  '@typescript-eslint/parser': '^8.5.0'
  eslint-config-prettier: '^9.1.0'
  eslint-plugin-react: '^7.35.0'
  eslint-plugin-react-hooks: '^5.2.0'
  typescript: '^6.0.3'
  vitest: '^4.1.7'
allowBuilds:
  '@nestjs/core': true
  '@prisma/engines': true
  cpu-features: false
  esbuild: true
  msw: true
  prisma: true
  protobufjs: false
  ssh2: false
  unrs-resolver: true
